<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amtgard QuestForge</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f7; color: #333; margin: 0; padding: 20px; }
        h1, h2, h3 { color: #2c3e50; text-align: center; }
        .container { max-width: 900px; margin: 0 auto; }
        
        .form-section { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px; position: relative;}
        .form-header-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; margin-bottom: 15px; padding-bottom: 5px; }
        .form-header-row h2 { margin: 0; }
        
        .npc-title-row { display: flex; justify-content: space-between; align-items: center; background: #eef2f5; padding: 8px 12px; border-radius: 4px; margin-bottom: 10px; }
        .npc-title-row h3 { margin: 0; font-size: 1.1rem; flex-grow: 1; text-align: left; }
        .npc-btn-group { display: flex; gap: 8px; }

        .form-group { display: flex; flex-direction: column; margin-bottom: 10px; }
        label { font-weight: bold; margin-bottom: 5px; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; font-size: 1rem; }
        
        /* Fixed Sizing for Textareas */
        textarea { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; font-size: 1rem; resize: vertical; height: 150px; width: 100%; box-sizing: border-box; }
        .npc-abilities { height: 150px; }
        
        .button-group { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .btn { padding: 12px 24px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; }
        .print-btn { background-color: #27ae60; }
        .add-npc-btn { background-color: #2980b9; }
        .add-item-btn { background-color: #2980b9; color: white; }
        .add-item-btn:hover { background-color: #1f618d; }
        
        .collapse-btn { background-color: #e74c3c; border: none; color: white; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.85rem;}
        .collapse-btn.collapsed { background-color: #34495e; }
        .remove-btn { background-color: #c0392b; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 0.85rem; }
        .delete-npc-btn { background-color: #7f8c8d; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.85rem;}
        .delete-npc-btn:hover { background-color: #c0392b; }

        .item-manager-row { display: flex; justify-content: space-between; align-items: center; padding: 8px; background: #f9f9f9; border-bottom: 1px solid #eee; margin-top: 5px; border-radius: 4px;}
        .hidden-form { display: none !important; }

        .builder-container { background: #f8f9fa; border: 1px solid #dcdde1; padding: 15px; border-radius: 6px; margin-top: 10px; }
        
        .preview-separator { margin-top: 100vh; border-top: 4px dashed #bdc3c7; padding-top: 40px; }

        .card { background: white; width: 6.5in; border: 2px dashed #7f8c8d; padding: 20px; box-sizing: border-box; page-break-inside: avoid; position: relative;}
        .card-quest-tag { font-size: 0.75rem; font-weight: bold; color: #7f8c8d; text-transform: uppercase; margin-bottom: 2px; }
        .card-title { font-size: 1.4rem; font-weight: bold; border-bottom: 2px solid #333; margin-bottom: 10px; padding-bottom: 5px; }
        .section-label { font-weight: bold; font-size: 0.8rem; color: #555; text-transform: uppercase; margin-top: 8px; }
        
        .quest-card { border-left: 8px solid #d35400; }
        .scenario-card { border-left: 8px solid #8e44ad; }
        .item-card { border-left: 8px solid #f1c40f; }
        .npc-card { border-left: 8px solid #2980b9; }
        
        @media print {
            body { background: white; }
            .form-section, .button-group, h1, h2, .remove-btn, .collapse-btn, .delete-npc-btn, .preview-separator h2 { display: none !important; }
            .preview-separator { margin-top: 0 !important; border-top: none !important; padding-top: 0 !important; }
            .npc-fields-container { display: block !important; }
            .card { border: 1px solid #ccc; margin-bottom: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Amtgard QuestForge</h1>

    <div class="form-section">
        <div class="form-header-row">
            <h2>Quest</h2>
            <button class="collapse-btn" onclick="toggleSection(this, 'quest-form-body')">Collapse ➖</button>
        </div>
        <div id="quest-form-body">
            <div class="form-group"><label>Title</label><input type="text" id="q-title" value="" oninput="updateCards()"></div>
            <div class="form-group"><label>Type</label><input type="text" id="q-type" value="" oninput="updateCards()"></div>
            <div class="form-group"><label>Requirements</label><input type="text" id="q-reqs" value="" oninput="updateCards()"></div>
            <div class="form-group"><label>Threat</label><input type="text" id="q-threat" value="" oninput="updateCards()"></div>
            <div class="form-group"><label>Reward</label><input type="text" id="q-reward" value="" oninput="updateCards()"></div>
            <div class="form-group"><label>Description</label><textarea id="q-desc" oninput="updateCards()"></textarea></div>
        </div>
    </div>

    <div class="form-section">
        <div class="form-header-row">
            <h2>Scenario</h2>
            <button class="collapse-btn" onclick="toggleSection(this, 'scen-form-body')">Collapse ➖</button>
        </div>
        <div id="scen-form-body">
            <div class="form-group">
                <label>Scenario Details</label>
                <textarea id="scen-notes" style="height: 120px;" oninput="updateCards()"></textarea>
            </div>
        </div>
    </div>

    <div class="form-section">
        <div class="form-header-row">
            <h2>Items</h2>
            <button class="collapse-btn" onclick="toggleSection(this, 'item-form-body')">Collapse ➖</button>
        </div>
        <div id="item-form-body">
            <div class="form-group" style="margin-bottom: 0;">
                <div style="display: flex; gap: 10px; align-items: center;">
                    <select id="item-selector" style="flex-grow: 1;">
                    </select>
                    <button class="btn add-item-btn" style="padding: 8px 16px;" onclick="addItemCard()">➕ Add Item</button>
                </div>
            </div>
            <div id="active-items-list" style="margin-top: 15px;"></div>
        </div>
    </div>

    <div class="form-section">
        <div class="form-header-row" style="border-bottom: 2px solid #2980b9;">
            <h2>NPCs</h2>
            <button class="collapse-btn" onclick="toggleSection(this, 'npc-form-outer-body')">Collapse ➖</button>
        </div>
        <div id="npc-form-outer-body">
            <div class="form-group" style="margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 6px; border: 1px dashed #2980b9;">
                <div style="display: flex; gap: 10px; flex-wrap: wrap; align-items: center;">
                    
                    <select id="npc-type-selector" onchange="handleNpcTypeChange()">
                        <option value="monster">Monster</option>
                        <option value="custom">Custom NPC</option>
                    </select>

                    <select id="npc-sub-selector" style="display: none;" onchange="handleNpcSubChange()">
                    </select>

                    <input type="text" id="npc-custom-name" style="display: none; width: 180px;">

                    <button class="btn add-npc-btn" style="padding: 8px 16px;" onclick="addNPCForm()">➕ Add NPC to Quest</button>
                </div>
            </div>
            <div id="npc-forms-container"></div>
        </div>
    </div>

    <div class="button-group">
        <button class="btn print-btn" onclick="window.print()">Print Cards</button>
    </div>

    <div class="preview-separator">
        <h2>Print Preview Area (Scrolled Down to Hide)</h2>
    </div>

    <div class="print-area" id="print-area">
        <div class="card quest-card">
            <div class="card-title" id="card-q-title">Unnamed Quest</div>
            <div class="section-label">Type</div><div id="card-q-type"></div>
            <div class="section-label">Description</div><div id="card-q-desc"></div>
            <div class="section-label">Requirements</div><div id="card-q-reqs"></div>
            <div class="section-label">Threat</div><div id="card-q-threat"></div>
            <div class="section-label">Reward</div><div id="card-q-reward"></div>
        </div>

        <div class="card scenario-card">
            <div class="card-quest-tag class-q-title-tag">[Quest: Unnamed Quest]</div>
            <div class="card-title">Scenario</div>
            <div id="card-scen-notes" style="white-space: pre-wrap;"></div>
        </div>

        <div id="item-cards-output" style="display: contents;"></div>
        <div id="npc-cards-output" style="display: contents;"></div>
    </div>
</div>

    let npcCounter = 0;
    let itemCounter = 0;

    function populateDropdowns() {
        const itemSelector = document.getElementById('item-selector');
        for (const key in amtgardItemsDB) {
            const item = amtgardItemsDB[key];
            const opt = document.createElement('option');
            opt.value = key;
            opt.textContent = item.name;
            itemSelector.appendChild(opt);
        }
    }

    function addItemCard() {
        itemCounter++;
        const itemKey = document.getElementById('item-selector').value;
        if (!itemKey) return;
        const item = amtgardItemsDB[itemKey];
        
        const listContainer = document.getElementById('active-items-list');
        const itemHtml = `
            <div class="item-manager-row" id="active-item-${itemCounter}" data-key="${itemKey}">
                <span>${item.name} (${item.cat})</span>
                <button class="remove-btn" onclick="removeItemCard(${itemCounter})">Remove ❌</button>
            </div>
        `;
        listContainer.insertAdjacentHTML('beforeend', itemHtml);
        updateCards();
    }

    function removeItemCard(id) {
        document.getElementById(`active-item-${id}`).remove();
        updateCards();
    }

function handleNpcTypeChange() {
    const type = document.getElementById('npc-type-selector').value;
    const subSelect = document.getElementById('npc-sub-selector');
    const customNameField = document.getElementById('npc-custom-name');
    
    subSelect.innerHTML = "";
    
    if (type === "monster") {
        subSelect.style.display = "inline-block";
        customNameField.style.display = "none";
        
        const monsterTiers = {
            "Tier 1 Monsters": ["beastfolk", "corrosion_beast", "enthralled_one", "fairy", "goblin", "skeleton", "unicorn", "wyvern"],
            "Tier 2 Monsters": [
                "automaton", "beast_base", "dwarf_smith", "elemental_air", "elemental_earth", 
                "elemental_fire", "elemental_water", "elf_ranger", "entangling_mass", "ghost", 
                "ghoul", "giant", "giant_spider", "gnome_tinkerer", "gorgon", "gremlin", 
                "halfling_adv", "hellhound", "imp", "kitsune", "lizardfolk_shaman", 
                "minotaur", "militia", "orc_battlerager", "raptor", "satyr_piper", 
                "shroomkin", "spriggan", "werewolf", "zombie"
            ],
            "Scenario Monsters": ["centaur", "deadly_slime", "fiend", "gargoyle", "harpy", "scalor", "treant", "troll", "vampire", "wraith"],
            "Legendary Monsters": ["dragon", "great_wyrm", "mystical_dragon", "hydra_kraken", "hydra_tail", "hydra_head", "lich", "phoenix"]
        };

        for (const [tierName, keys] of Object.entries(monsterTiers)) {
            const optgroup = document.createElement('optgroup');
            optgroup.label = tierName;
            keys.forEach(key => {
                if (amtgardMonstersDB[key]) {
                    optgroup.innerHTML += `<option value="${key}">${amtgardMonstersDB[key].class}</option>`;
                }
            });
            subSelect.appendChild(optgroup);
        }
    } else {
        subSelect.style.display = "none";
        customNameField.style.display = "inline-block";
    }
}

    function addNPCForm() {
        npcCounter++;
        const type = document.getElementById('npc-type-selector').value;
        const subKey = document.getElementById('npc-sub-selector').value;
        const overrideName = document.getElementById('npc-custom-name').value.trim();
        
        let npcName = overrideName || (type === 'monster' ? amtgardMonstersDB[subKey].class : "Custom NPC");
        let npcAbilities = type === 'monster' ? amtgardMonstersDB[subKey].abilities : "";

        const html = `
            <div class="npc-block" id="npc-form-${npcCounter}" style="margin-bottom: 15px;">
                <div class="npc-title-row">
                    <h3 id="form-npc-title-${npcCounter}">${npcName}</h3>
                    <div class="npc-btn-group">
                        <button class="collapse-btn collapsed" onclick="toggleSection(this, 'npc-fields-${npcCounter}')">Expand ➕</button>
                        <button class="delete-npc-btn" onclick="removeNPC(${npcCounter})">Delete 🗑️</button>
                    </div>
                </div>
                <div id="npc-fields-${npcCounter}" class="npc-fields-container hidden-form">
                    <div class="form-group"><label>Name</label><input type="text" class="npc-name" value="${npcName}" oninput="updateCards()"></div>
                    <div class="form-group"><label>Abilities / Stats</label><textarea class="npc-abilities" oninput="updateCards()">${npcAbilities}</textarea></div>
                </div>
            </div>
        `;
        document.getElementById('npc-forms-container').insertAdjacentHTML('beforeend', html);
        updateCards();
    }

    function removeNPC(id) {
        document.getElementById(`npc-form-${id}`).remove();
        updateCards();
    }

    function toggleSection(btn, bodyId) {
        const body = document.getElementById(bodyId);
        if (body.classList.contains('hidden-form')) {
            body.classList.remove('hidden-form');
            btn.textContent = "Collapse ➖";
            btn.classList.remove('collapsed');
        } else {
            body.classList.add('hidden-form');
            btn.textContent = "Expand ➕";
            btn.classList.add('collapsed');
        }
    }

    function updateCards() {
        document.getElementById('card-q-title').textContent = document.getElementById('q-title').value || "Unnamed Quest";
        document.getElementById('card-q-type').textContent = document.getElementById('q-type').value;
        document.getElementById('card-q-desc').textContent = document.getElementById('q-desc').value;
        document.getElementById('card-q-reqs').textContent = document.getElementById('q-reqs').value;
        document.getElementById('card-q-threat').textContent = document.getElementById('q-threat').value;
        document.getElementById('card-q-reward').textContent = document.getElementById('q-reward').value;
        document.getElementById('card-scen-notes').textContent = document.getElementById('scen-notes').value;

        // Render Item Cards
        const itemOutput = document.getElementById('item-cards-output');
        itemOutput.innerHTML = "";
        document.querySelectorAll('.item-manager-row').forEach(row => {
            const key = row.getAttribute('data-key');
            const item = amtgardItemsDB[key];
            itemOutput.innerHTML += `
                <div class="card item-card">
                    <div class="card-quest-tag">[Item: ${item.cat}]</div>
                    <div class="card-title">${item.name}</div>
                    <div>${item.text}</div>
                </div>
            `;
        });

        // Render NPC Cards
        const npcOutput = document.getElementById('npc-cards-output');
        npcOutput.innerHTML = "";
        document.querySelectorAll('.npc-block').forEach(block => {
            npcOutput.innerHTML += `
                <div class="card npc-card">
                    <div class="card-title">${block.querySelector('.npc-name').value}</div>
                    <div class="section-label">Abilities / Stats</div><div style="white-space: pre-wrap;">${block.querySelector('.npc-abilities').value}</div>
                </div>
            `;
        });
    }

    window.onload = function() {
        populateDropdowns();
        handleNpcTypeChange();
    };
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amtgard - Rules of Play Test</title>
    <style>
        body { 
            font-family: sans-serif; 
            background-color: #2c241a; 
            color: #3e2723; 
            display: flex; 
            justify-content: center; 
            padding: 30px; 
            margin: 0;
        }
        .container { 
            max-width: 800px; 
            width: 100%;
            background: #f4e4bc; 
            padding: 30px; 
            border: 4px solid #5d4037; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 { 
            text-align: center; 
            border-bottom: 2px solid #5d4037; 
            padding-bottom: 15px; 
            margin-top: 0;
        }
        .question-block {
            background: rgba(0,0,0,0.05);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            border-left: 5px solid #5d4037;
        }
        .question-text {
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        label {
            cursor: pointer;
            margin-right: 20px;
            font-size: 1rem;
        }
        .btn {
            background: #5d4037;
            color: #f4e4bc;
            border: none;
            padding: 12px 24px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            display: block;
            margin: 20px auto 0;
            transition: background 0.2s;
        }
        .btn:hover { background: #3e2723; }
        #results {
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
        .pass { background: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        .fail { background: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <h1>Amtgard - Rules of Play Test</h1>
    <div id="quiz-container"></div>
    <button class="btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
    <div id="results"></div>
    <button class="btn" id="retry-btn" style="display: none;" onclick="initQuiz()">Retake Quiz</button>
</div>

<script>
    const allQuestions = [
        { q: "A player may block a verbal magic spell with their shield.", a: "false" },
        { q: "Engulfing effects affect the target even if they only strike a weapon or shield.", a: "true" },
        { q: "If a player is killed, they must immediately drop any carried game items that do not belong to them.", a: "true" },
        { q: "Players may not move their feet while chanting a magic incantation unless the spell specifies otherwise.", a: "true" },
        { q: "When a player is Insubstantial, they may be targeted by any verbal magic.", a: "false" },
        { q: "A limb struck by a weapon with the Armor Breaking trait is wounded, even if that limb was unarmored.", a: "true" },
        { q: "A target wearing 2 points of normal armor is struck by an Armor Destroying weapon. The target's armor in that location is reduced to 0.", a: "true" },
        { q: "An arrow strike to an unarmored torso results in a death.", a: "true" },
        { q: "A player who is Frozen may still speak and activate any verbal abilities.", a: "false" },
        { q: "Suppressed players cannot cast magic or activate class abilities.", a: "true" },
        { q: "Magic armor may be combined and stacked with normal armor to increase a player's total armor points.", a: "false" },
        { q: "A shot that strikes a player's garb but does not hit their body or armor is counted as a valid hit.", a: "false" },
        { q: "A combatant is permitted to hold a weapon by its strike-legal padding to block an incoming attack.", a: "false" },
        { q: "Verbal abilities with a range of 20 feet must include the target's name or their class and a short description in the incantation.", a: "true" },
        { q: "If a player is Dead, they are allowed to give tactical advice to their living teammates on the field.", a: "false" },
        { q: "Weapons used to strike a player must make solid contact to be considered a valid hit.", a: "true" },
        { q: "A hand struck below the wrist is considered an invalid target if it is holding a weapon or shield handle.", a: "true" },
        { q: "A player may voluntarily take a wound to a limb at any time to avoid a different effect.", a: "false" },
        { q: "If an arrow strikes a shield, the shield is destroyed immediately.", a: "false" },
        { q: "A player must announce their class before a battlegame begins if requested by another player or Reeve.", a: "true" },
        { q: "A player may be banned for speech that would cause a reasonable person to fear for their property or safety.", a: "true" },
        { q: "A park Monarch has the authority to overturn a ban that was instituted at the Kingdom level.", a: "false" },
        { q: "A Kingdom Monarch can choose to exempt their Kingdom from a ban related to sexual harassment or inappropriate sexual contact.", a: "false" },
        { q: "Individuals currently listed on a sexual offender registry for a conviction in the United States are prohibited from participating in any Amtgard function.", a: "true" },
        { q: "A child under the age of fourteen may participate in adult combat if a monarch determines they are mentally and emotionally capable and their legal guardian is present.", a: "true" },
        { q: "A hand is considered wounded if struck below the wrist while wielding a melee weapon, shield, or bow.", a: "false" },
        { q: "A player may be called dead by a reeve for intentional head blocking.", a: "true" },
        { q: "A wounded arm must be kept out of combat and cannot wield equipment or cast abilities.", a: "true" },
        { q: "Bashing an opponent's shield is a prohibited action in combat.", a: "true" },
        { q: "Passively using a shield to prevent an opponent's forward movement is considered prohibited body to shield contact.", a: "false" },
        { q: "A valid slash must be percussive and stop on or deflect off the victim.", a: "true" },
        { q: "Any contact from the Strike-Legal portion of a projectile weapon is considered a valid hit.", a: "true" },
        { q: "A draw cut is an example of a valid stab because it impacts the victim cleanly.", a: "false" },
        { q: "A player dies if they receive a single wound to the torso.", a: "true" },
        { q: "While dead, a player may retrieve their own equipment from the field, provided they stay at least 10' from any living opposing players.", a: "true" },
        { q: "If you are unsure whether an opponent's shot was valid, you should treat it as valid and take the hit.", a: "true" },
        { q: "When dead, you should place your hand or weapon on or above your head to visually indicate your status.", a: "true" },
        { q: "You are encouraged to call shots on other players during combat to ensure everyone is playing correctly.", a: "false" },
        { q: "If you strike an opponent in the head and gain an advantage, you should continue fighting to maintain your momentum.", a: "false" },
        { q: "When an 'emergency' is announced, all players must immediately stop play and cease moving until the incident is resolved.", a: "true" },
        { q: "If a player wears armor with a point value higher than their class allows, it is capped at the highest value permitted for that class.", a: "true" },
        { q: "Damage to worn armor is tracked by the physical piece of armor, not by hit location.", a: "false" },
        { q: "A standard hit to a location with armor will remove exactly one Armor Point from that location.", a: "true" },
        { q: "If a player is struck in an area of the body not covered by their armor, the armor takes damage and the player remains unwounded.", a: "false" },
        { q: "Armor worn on a limb that has already received a wound continues to function and will stop blows as normal.", a: "true" },
        { q: "A weapon that meets all technical construction requirements is guaranteed to be considered safe for use on the field.", a: "false" },
        { q: "Metal and wooden cores are prohibited for use in Amtgard melee weapons.", a: "true" },
        { q: "A cross guard is a required component that must be present on every melee weapon.", a: "false" },
        { q: "Strike-Legal surfaces must have at least 1/2 inch of foam over the weapon core.", a: "false" },
        { q: "The total length of a weapon is measured in a straight line from the bottom of the pommel to the furthest point of the weapon.", a: "true" },
        { q: "A destroyed melee weapon is considered unwielded carried equipment when held in hand.", a: "true" },
        { q: "For a Short weapon, you may substitute up to 1/3 of its length for Heavy Padding.", a: "true" },
        { q: "A Magic Staff may be used to strike opponents, provided it is padded along its entire length.", a: "false" },
        { q: "A shield strapped to a player's back that is not gripped in their hand is considered unwielded and does not protect the player.", a: "true" },
        { q: "A Madu is considered a single item, meaning abilities or effects that target either the shield or weapon portion affect the entirety of the Madu.", a: "true" },
        { q: "Projectiles such as Light Thrown weapons and rocks are permitted to be used to parry or block incoming attacks.", a: "false" },
        { q: "Hits from Rocks are considered Armor Breaking and Shield Crushing.", a: "true" },
        { q: "Arrows do not need to be labeled with the owner's name if they are used by the owner on the field.", a: "false" },
        { q: "A bow may be swung towards an incoming strike in order to block the attack.", a: "false" },
        { q: "At a distance of 20 feet or less, bows must be no more than half drawn, though this does not apply to crossbows.", a: "true" },
        { q: "Archetypes are a type of enchantment that can be removed by a Dispel effect.", a: "false" },
        { q: "A player may maintain more than one Chant simultaneously.", a: "false" },
        { q: "Performing the Charge Incantation requires an empty hand.", a: "true" },
        { q: "If an ability is cast improperly, the use of that ability is still expended even though it has no effect.", a: "true" },
        { q: "Extraordinary (ex) enchantments count toward a player's limit for carried enchantments.", a: "false" },
        { q: "If an ability is cast improperly, such as being suppressed, the use of that ability is still expended even though it has no effect.", a: "true" },
        { q: "Players are permitted to carry only one Magical enchantment at a time, unless an ability changes the amount.", a: "true" },
        { q: "If a player voluntarily takes a death, all Enchantments they are carrying are removed.", a: "true" },
        { q: "An Enchantment with a definite number of uses is only removed if the effect successfully impacts a target.", a: "false" },
        { q: "If an Enchantment that imparts a Cursed state is removed, the Cursed state is also automatically removed.", a: "false" },
        { q: "Forced Movement effects will fail if they are cast upon a player who is already Stopped.", a: "true" },
        { q: "If the name of a target is unknown, a caster may point at them with an empty hand and use two descriptors, such as their class and the color of their tunic.", a: "true" },
        { q: "An interrupted incantation results in the ability being consumed as if it had been successfully cast.", a: "false" },
        { q: "Under normal rules, a player is prohibited from moving their feet while performing an incantation.", a: "true" },
        { q: "Starting an incantation has no effect on any active Magic Balls currently held by the player.", a: "false" },
        { q: "The target of an ability must be at least partially visible to the caster at the moment the incantation is completed.", a: "true" },
        { q: "If a player is granted Magic Armor from two different sources, the values are added together to create a higher total armor point value.", a: "false" },
        { q: "Magic Armor behaves identically to normal armor and can be repaired using the same methods.", a: "true" },
        { q: "A player whose class allows for zero points of armor is prohibited from bearing Magic Armor.", a: "false" },
        { q: "A player may wield a weapon or shield in the same hand that is holding an active Magic Ball.", a: "true" },
        { q: "Ambulant is the only Meta-Magic that allows a player to move their feet while casting the incantation.", a: "true" },
        { q: "Meta-Magic incantations must be stated after the incantation for the ability they are modifying has been completed.", a: "false" },
        { q: "Meta-Magics are permitted to be used to modify abilities granted by Enchantments, such as Heat Weapon.", a: "false" },
        { q: "If a caster completes an incantation but the target is out of range, the ability is still expended even though it has no effect.", a: "true" },
        { q: "If a weapon has multiple Special Effects, such as Armor Breaking and Wounds Kill, it is important to surprise your opponent by not declaring them until they take effect.", a: "false" },
        { q: "Armor Breaking immediately removes all Armor Points from a location if the armor currently has three or fewer points remaining.", a: "true" },
        { q: "Phasing hits are powerful because they allow the attacker to ignore the States of the target, such as Frozen.", a: "false" },
        { q: "Shield Crushing hits are cumulative, meaning three hits from different sources will destroy a shield.", a: "true" },
        { q: "A player hit by a Siege effect is killed and all of their carried equipment is destroyed.", a: "true" }
    ];

    let currentQuiz = [];

    function shuffleArray(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    function initQuiz() {
        document.getElementById('results').style.display = 'none';
        document.getElementById('submit-btn').style.display = 'block';
        document.getElementById('retry-btn').style.display = 'none';
        
        const container = document.getElementById('quiz-container');
        container.innerHTML = ''; 
        
        let shuffled = shuffleArray([...allQuestions]);
        currentQuiz = shuffled.slice(0, 10);

        currentQuiz.forEach((item, index) => {
            const block = document.createElement('div');
            block.className = 'question-block';
            block.innerHTML = `
                <div class="question-text">${index + 1}. ${item.q}</div>
                <label><input type="radio" name="q${index}" value="true"> True</label>
                <label><input type="radio" name="q${index}" value="false"> False</label>
            `;
            container.appendChild(block);
        });
    }

    function gradeQuiz() {
        let score = 0;
        let answeredAll = true;

        currentQuiz.forEach((item, index) => {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            if (!selected) {
                answeredAll = false;
            } else if (selected.value === item.a) {
                score++;
            }
        });

        if (!answeredAll) {
            alert("Please answer all 10 questions before submitting.");
            return;
        }

        const percentage = (score / 10) * 100;
        const resultsDiv = document.getElementById('results');
        
        if (percentage >= 80) {
            resultsDiv.className = 'pass';
            resultsDiv.innerHTML = `Success! You scored ${percentage}% (${score}/10).`;
        } else {
            resultsDiv.className = 'fail';
            resultsDiv.innerHTML = `Failed. You scored ${percentage}% (${score}/10). You need 80% to pass.`;
        }

        resultsDiv.style.display = 'block';
        document.getElementById('submit-btn').style.display = 'none';
        document.getElementById('retry-btn').style.display = 'block';
    }

    window.onload = initQuiz;
</script>

</body>
</html>

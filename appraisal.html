<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Amtgard Appraise Item</title>
    <style>
        body { background: #2c241a; color: #3e2723; font-family: 'Georgia', serif; display: flex; justify-content: center; padding: 20px; }
        #parchment { background: #f4e4bc; width: 100%; max-width: 650px; padding: 40px; border: 5px double #5d4037; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        h1 { text-align: center; text-transform: uppercase; border-bottom: 2px solid #5d4037; padding-bottom: 10px; }
        .view { display: none; } .active { display: block; }
        select, button { width: 100%; padding: 12px; margin: 10px 0; font-size: 16px; cursor: pointer; border: 1px solid #5d4037; background: #e8d5a8; }
        .clue-box { background: rgba(0,0,0,0.05); padding: 15px; border-radius: 5px; list-style: disc; margin: 15px 0; }
        #feedback { font-weight: bold; text-align: center; margin: 15px 0; min-height: 20px; }
    </style>
</head>
<body>

<div id="parchment">
    <!-- Runner Selection -->
    <div id="selection-screen" class="view active">
        <h1>Quest Runner</h1>
        <label>Select Item to Appraise:</label>
        <select id="item-picker"><option value="random">Randomize Item</option></select>
        <button onclick="startGame()">Start Appraisal</button>
    </div>

    <!-- Player Game -->
    <div id="game-screen" class="view">
        <h1>Appraisal</h1>
        <p id="appearance-text"></p>
        <ul id="clue-list" class="clue-box"></ul>
        <select id="guess-select"><option value="">-- Identify the Artifact --</option></select>
        <button onclick="checkAnswer()">Submit Appraisal</button>
        <div id="feedback"></div>
        <button onclick="resetApp()">Return to Selection</button>
    </div>
</div>

<script>
const items = [
    { name: "Potion of Barkskin", appearance: "A bottle containing earthy, thick liquid.", clues: ["Allows casting of Barkskin.", "Requires a bottle of at least two cubic inches.", "Consumed by drinking."], falseClues: ["Allows the user to speak to trees."] },
    { name: "Potion of Refreshment", appearance: "A bottle holding a light, effervescent liquid.", clues: ["Allows casting of Confidence.", "Requires a bottle of at least two cubic inches.", "Consumed by drinking."], falseClues: ["Fully restores all magic points."] },
    { name: "Potion of Healing", appearance: "A swirling red liquid that pulses with soft light.", clues: ["Allows casting of Heal (self).", "Requires a bottle of at least two cubic inches.", "Consumed by drinking."], falseClues: ["Can revive a dead teammate."] },
    { name: "Potion of True Death", appearance: "A dark, stagnant vial that feels cold.", clues: ["Prevents Raise Dead or Vampirism.", "Requires a bottle of at least two cubic inches.", "Effect persists through Release or Respawn."], falseClues: ["Instantly kills the target."] },
    { name: "Scroll of Adaptive Blessing", appearance: "A scroll made of weathered, sturdy parchment.", clues: ["Allows casting of Adaptive Blessing.", "Requires a scroll of at least fifteen square inches.", "Must be read aloud."], falseClues: ["Can only be used in the rain."] },
    { name: "Scroll of Ambulant", appearance: "A thin, delicate scroll that seems to flutter.", clues: ["Affects next magic as per Ambulant.", "Requires a scroll of at least fifteen square inches.", "May only be used by Magic Users."], falseClues: ["Allows the user to fly."] },
    { name: "Scroll of Blessing Against Wounds", appearance: "A scroll with gold ink borders.", clues: ["Allows casting of Blessing Against Wounds.", "Requires a scroll of at least fifteen square inches.", "Must be read aloud."], falseClues: ["Grants permanent invincibility."] },
    { name: "Scroll of Extension", appearance: "An elongated scroll.", clues: ["Affects next magic as per Extension.", "Requires a scroll of at least fifteen square inches.", "May only be used by Magic Users."], falseClues: ["Extends the length of your weapon."] },
    { name: "Scroll of Harden", appearance: "A scroll with a rough, stone-like texture.", clues: ["Allows casting of Harden.", "Requires a scroll of at least fifteen square inches.", "Must be read aloud."], falseClues: ["Hardens your skin into iron."] },
    { name: "Scroll of Mend", appearance: "A scroll with faint blue ink.", clues: ["Allows casting of Mend.", "Requires a scroll of at least fifteen square inches.", "Must be read aloud."], falseClues: ["Mends broken hearts."] },
    { name: "Amulet of Force", appearance: "A metallic pendant that vibrates slightly.", clues: ["Allows casting of Force Barrier.", "Must be worn around the neck.", "Pendant must be at least one square inch."], falseClues: ["Allows the user to become invisible."] },
    { name: "Amulet of Teleport", appearance: "An amulet that hums with distant energy.", clues: ["Allows casting of Teleport.", "Must be worn around the neck.", "Pendant must be at least one square inch."], falseClues: ["Teleports the user to the starting point."] },
    { name: "Amulet of Tracking", appearance: "A compass-like amulet.", clues: ["Allows casting of Tracking.", "Range of 20 feet.", "Must be worn around the neck."], falseClues: ["Can track through solid mountains."] },
    { name: "Amulet of Shadows", appearance: "A smoky, dark stone amulet.", clues: ["Allows casting of Shadow Step.", "Must be worn around the neck.", "Pendant must be at least one square inch."], falseClues: ["Turns the wearer into a shadow."] },
    { name: "Bracelet of Anti-Magic", appearance: "A sturdy leather band.", clues: ["Allows casting of Protection From Magic.", "Must be worn on the wrist.", "Cannot be red, yellow, or white."], falseClues: ["Makes the wearer immune to all weapons."] },
    { name: "Bracelet of Solidity", appearance: "A metal bracelet that feels surprisingly heavy.", clues: ["Bearer is immune to insubstantial effects.", "Must be worn on the wrist.", "Must announce immunity when triggered."], falseClues: ["Provides extra strength."] },
    { name: "Bracelet of Stoneskin", appearance: "A grey bracelet with a rough finish.", clues: ["Allows casting of Stoneskin.", "Must be worn on the wrist.", "Cannot be red, yellow, or white."], falseClues: ["Turns the user into a statue."] },
    { name: "Wand of Healing", appearance: "A rigid wooden wand over 6 inches long.", clues: ["Allows casting of Greater Heal.", "Can be used twice per game.", "Must be at least 0.5 inches in diameter."], falseClues: ["Heals everyone in the room."] },
    { name: "Wand of Mending", appearance: "A polished wooden rod.", clues: ["Allows casting of Greater Mend.", "Can be used twice per game.", "Must be at least 6 inches long."], falseClues: ["Mends shields automatically."] },
    { name: "Wand of Release", appearance: "A slim wand with intricate carvings.", clues: ["Allows casting of Greater Release.", "Can be used twice per game.", "Must be at least 6 inches long."], falseClues: ["Releases the user from gravity."] },
    { name: "Ankh of Ran", appearance: "A white ankh symbol.", clues: ["Bearer gains Terror (20').", "Affects Undead, Vampirism, or Void Touched.", "Must be displayed on garb or worn as amulet."], falseClues: ["Grants immunity to fire."] },
    { name: "Andalsa's Lament", appearance: "A helmet with a white enchantment strip.", clues: ["Affected as per Imbue Armor.", "Does not count as an enchantment.", "Must be worn on the head."], falseClues: ["Increases movement speed."] },
    { name: "Cloak of Enigmas", appearance: "A black cloak covering shoulders to knees.", clues: ["Doubles use of Shadow Step, Teleport, and Blink.", "Does not count as an enchantment.", "Restricted to Assassin or Scout."], falseClues: ["Grants flight."] },
    { name: "Homestone", appearance: "A highly polished stone sphere.", clues: ["Bearer gains Greater Mend 1/Life charge x3.", "Does not count as an enchantment.", "Must be carried."], falseClues: ["Always leads you home."] },
    { name: "Michael's Hammer", appearance: "A hammer with yellow cover and red strip.", clues: ["Armor and Shield Destroying.", "Does not count as an enchantment.", "Must have at least 6 inches of heavy padding."], falseClues: ["Can fly back to your hand."] },
    { name: "Nuntius Staff", appearance: "A double-ended magic staff.", clues: ["Used by Magic Users at no cost.", "Grants two additional magic points.", "Does not count as an enchantment."], falseClues: ["Can shoot lightning bolts."] },
    { name: "Phase Blade", appearance: "A short weapon with grey cover and red/yellow strips.", clues: ["Weapon is Phasing.", "Does not count as an enchantment.", "Must be carried."], falseClues: ["Can walk through walls."] },
    { name: "Shield of the Chosen", appearance: "A medium shield with black cover and white device.", clues: ["Indestructible.", "Nullifies engulfing effects.", "Requires white enchantment strip."], falseClues: ["Gives the wielder super strength."] },
    { name: "Sword of Flame", appearance: "A short weapon with orange cover and red/white strips.", clues: ["Immune to Flame.", "Armor Breaking and Shield Crushing.", "Does not count as an enchantment."], falseClues: ["Requires two hands."] }
];

let currentItem = {};

function startGame() {
    const val = document.getElementById('item-picker').value;
    currentItem = (val === 'random') ? items[Math.floor(Math.random() * items.length)] : items.find(i => i.name === val);
    document.getElementById('appearance-text').innerText = "Appearance: " + currentItem.appearance;
    let clueList = [...currentItem.clues.slice(0, 3), currentItem.falseClues[0]].sort(() => Math.random() - 0.5);
    document.getElementById('clue-list').innerHTML = clueList.map(c => `<li>${c}</li>`).join('');
    document.getElementById('selection-screen').classList.remove('active');
    document.getElementById('game-screen').classList.add('active');
}

function checkAnswer() {
    const guess = document.getElementById('guess-select').value;
    document.getElementById('feedback').innerText = (guess === currentItem.name) ? "Correct! You have identified the item." : "Incorrect. That is not the correct artifact.";
}

function resetApp() {
    document.getElementById('game-screen').classList.remove('active');
    document.getElementById('selection-screen').classList.add('active');
    document.getElementById('feedback').innerText = "";
}

// Init Dropdowns
const picker = document.getElementById('item-picker');
const guess = document.getElementById('guess-select');
items.forEach(i => {
    picker.innerHTML += `<option value="${i.name}">${i.name}</option>`;
    guess.innerHTML += `<option value="${i.name}">${i.name}</option>`;
});
</script>

</body>
</html>
